name: astrbot_plugin_auto
display_name: 自动群名片
desc: "自动更新群名片和个性签名，支持多信息源随机/循环切换、多配置倒计时、WebUI群聊选择"
help: |
  自动群名片插件

  功能：
  - 自动更新群名片（支持快速/普通/超慢速三种模式）
  - 自动更新个性签名
  - 12种信息源：系统监控、热搜、一言、倒计时等
  - 同一信息源支持多配置（如多个倒计时）
  - 随机/循环不重复两种抽取模式
  - 自动缓存群列表，WebUI下拉选择目标群

  命令：
  - 查看群名片状态
  - 手动更新群名片
  - 查看所有群聊
  - 缓存所有群聊
  - 一键添加所有群聊到目标
  - 添加目标群 <关键词>

version: v3.1.0
author: Qiscard
repo: https://github.com/Qiscard/astrbot_plugin_auto
